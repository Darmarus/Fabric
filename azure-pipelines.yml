name: $(Date:yyyyMMdd).$(Rev:r)

resources:
- repo: self
  clean: true

stages:
- stage: Build_Test
  displayName: Build and test
  jobs:
  - job: Build_Test
    displayName: Build and test
    timeoutInMinutes: 300
    pool:
      name: Default
      demands:
      - msbuild
      - vstest

    steps:
    - checkout: self
      clean: true

    - task: MSBuild@1
      displayName: Restore and build
      inputs:
        solution: '**/*.csproj'
        configuration: Debug
        msbuildArguments: '/r /p:GeneratePackageOnBuild=true'

    - powershell: |
        if (Get-ChildItem -Recurse -Filter *.UnitTest.csproj -File) {
          Write-Host "##vso[task.setVariable variable=RunUnitTests]True"
        }
        else {
          Write-Host "##vso[task.setVariable variable=RunUnitTests]False"
        }
      displayName: Discover unit tests

    - task: DotNetCoreCLI@2
      condition: and(succeeded(), eq(variables['RunUnitTests'], 'True'))
      displayName: Run unit tests
      inputs:
        command: test
        projects: '**/*.UnitTest.csproj'
        arguments: '--no-build --configuration Debug'

    - powershell: Start-SonetaTestInfrastructure
      displayName: Start integration tests infrastructure

    - task: VisualStudioTestPlatformInstaller@1
      displayName: Visual Studio Test Platform Installer
      inputs:
        packageFeedSelector: nugetOrg
        versionSelector: latestStable

    - task: VSTest@2
      displayName: VsTest - test assemblies
      continueOnError: true
      inputs:
        testSelector: testAssemblies
        testAssemblyVer2: |
          **\*test*.dll
          !**\*TestAdapter.dll
          !**\obj\**
        searchFolder: $(System.DefaultWorkingDirectory)
        vsTestVersion: toolsInstaller

    - powershell: Stop-SonetaTestInfrastructure
      displayName: Stop integration tests infrastructure
      condition: always()

    - publish: $(System.DefaultWorkingDirectory)\bin
      displayName: Publish artifacts
      artifact: SamplesArtifacts

- stage: Deploy
  displayName: Deploy
  dependsOn: Build_Test
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: Push NuGet packages to Azure Artifacts
    pool:
      name: Default

    steps:
    - checkout: none

    - download: current
      artifact: SamplesArtifacts

    - task: NuGetToolInstaller@1
      displayName: Install NuGet

    - task: NuGetCommand@2
      displayName: Push packages to Azure Artifacts
      inputs:
        command: push
        nuGetFeedType: internal
        publishVstsFeed: 'NAZWA_TWOJEGO_FEEDA'
        packagesToPush: '$(Agent.BuildDirectory)/SamplesArtifacts/**/*.nupkg'