name: $(Date:yyyyMMdd).$(Rev:r)

trigger:
- master

pool:
  name: Default

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  companyName: 'Agemit Sp. z o.o.'
  trademarkName: 'MD'

steps:
- checkout: self
  clean: true

- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

- task: NuGetCommand@2
  displayName: 'Restore NuGet packages'
  inputs:
    command: 'restore'
    restoreSolution: '$(solution)'

# Zamiennik dla Assembly-Info-NetFramework@2
# Nie wymaga instalowania rozszerzenia z Marketplace.
- powershell: |
    $now = Get-Date
    $version = "{0}.{1}.{2}.{3}" -f $now.ToString("yyMM"), "$(Build.BuildId)", $now.ToString("dd"), $now.ToString("HHmm")

    Write-Host "Using version: $version"

    $title = "$(Build.DefinitionName)"
    $product = "$(Build.DefinitionName)"
    $company = "$(companyName)"
    $trademark = "$(trademarkName)"
    $copyright = "Copyright © $($now.ToString("dd MMMM yyyy")) $(companyName)"

    $files = Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Include AssemblyInfo.cs,AssemblyInfo.vb,GlobalInfo.cs,GlobalInfo.vb -File

    foreach ($file in $files) {
      Write-Host "Updating $($file.FullName)"

      $content = Get-Content $file.FullName -Raw

      if ($file.Extension -eq ".cs") {
        $replacements = @{
          'AssemblyTitle' = $title
          'AssemblyProduct' = $product
          'AssemblyCompany' = $company
          'AssemblyCopyright' = $copyright
          'AssemblyTrademark' = $trademark
          'AssemblyVersion' = $version
          'AssemblyFileVersion' = $version
          'AssemblyInformationalVersion' = $version
        }

        foreach ($key in $replacements.Keys) {
          $value = $replacements[$key]

          if ($content -match "\[assembly:\s*$key\(") {
            $content = $content -replace "\[assembly:\s*$key\(""[^""]*""\)\]", "[assembly: $key(`"$value`")]"
          }
          else {
            $content += "`r`n[assembly: $key(`"$value`")]"
          }
        }
      }

      if ($file.Extension -eq ".vb") {
        $replacements = @{
          'AssemblyTitle' = $title
          'AssemblyProduct' = $product
          'AssemblyCompany' = $company
          'AssemblyCopyright' = $copyright
          'AssemblyTrademark' = $trademark
          'AssemblyVersion' = $version
          'AssemblyFileVersion' = $version
          'AssemblyInformationalVersion' = $version
        }

        foreach ($key in $replacements.Keys) {
          $value = $replacements[$key]

          if ($content -match "<Assembly:\s*$key\(") {
            $content = $content -replace "<Assembly:\s*$key\(""[^""]*""\)>", "<Assembly: $key(`"$value`")>"
          }
          else {
            $content += "`r`n<Assembly: $key(`"$value`")>"
          }
        }
      }

      Set-Content -Path $file.FullName -Value $content -Encoding UTF8
    }

    # Dla projektów SDK-style można dodatkowo ustawić zmienne dla MSBuild.
    Write-Host "##vso[task.setVariable variable=PackageVersion]$version"
    Write-Host "##vso[task.setVariable variable=AssemblyVersion]$version"
    Write-Host "##vso[task.setVariable variable=FileVersion]$version"
    Write-Host "##vso[task.setVariable variable=InformationalVersion]$version"
  displayName: 'Update assembly version info'

- task: VSBuild@1
  displayName: 'Build solution'
  inputs:
    solution: '$(solution)'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    msbuildArgs: >
      /p:GeneratePackageOnBuild=true
      /p:Version=$(PackageVersion)
      /p:AssemblyVersion=$(AssemblyVersion)
      /p:FileVersion=$(FileVersion)
      /p:InformationalVersion=$(InformationalVersion)

- task: PublishSymbols@2
  displayName: 'Publish symbols path'
  inputs:
    SearchPattern: '**\bin\**\*.pdb'
    PublishSymbols: false
  continueOnError: true

- task: CopyFiles@2
  displayName: 'Copy build output to artifact staging directory'
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)'
    Contents: |
      **\bin\Release\**
      **\*.nupkg
      !**\obj\**
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
  condition: succeededOrFailed()

- task: PublishBuildArtifacts@1
  displayName: 'Publish artifact: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
  condition: succeededOrFailed()